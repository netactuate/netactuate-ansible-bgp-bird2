---
- name: Include BIRD variables
  ansible.builtin.include_vars: bird.yml

- name: Install BIRD
  ansible.builtin.apt:
    package: bird2
    state: present

- name: Create config files
  ansible.builtin.template:
    src: "{{ item.name }}"
    dest: "/etc/bird/{{ item.name }}"
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  with_items: '{{ conffiles }}'
  notify:
    - reload bird2
